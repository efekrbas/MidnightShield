version: '3.8'

services:
  midnight-proof-server:
    image: midnightnetwork/proof-server:latest
    container_name: midnight-shield-proof-server
    ports:
      - "6300:6300"
    environment:
      - LOG_LEVEL=debug
    volumes:
      - proof-data:/var/lib/midnight/proof-data
    networks:
      - midnight-shield-network
    restart: unless-stopped

  midnight-sandbox:
    image: midnightnetwork/sandbox:latest
    container_name: midnight-shield-sandbox
    ports:
      - "9944:9944"
      - "9933:9933"
    environment:
      - LOG_LEVEL=debug
    networks:
      - midnight-shield-network
    restart: unless-stopped

networks:
  midnight-shield-network:
    driver: bridge

volumes:
  proof-data:
